<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>
<body>
  <h1>Players List</h1>

  <button onclick="loadPlayers()">Load Players</button>

  <ul id="players"></ul>

  <script>
    function loadPlayers() {
      fetch("/admin/players")
        .then(res => res.json())
        .then(data => {
          const list = document.getElementById("players");
          list.innerHTML = "";

          data.forEach(player => {
            const li = document.createElement("li");
            li.innerText = player.name + " - Coins: " + player.coins;
            list.appendChild(li);
          });
        });
    }
  </script>
<script>
async function loadPlayers() {
  try {
    const res = await fetch("/admin/players");
    const data = await res.json();

    const container = document.getElementById("players");
    container.innerHTML = "";

    if (!data) {
      container.innerHTML = "<p>No players found</p>";
      return;
    }

    Object.entries(data).forEach(([id, player]) => {
      const div = document.createElement("div");
      div.innerHTML = `
        <hr>
        <p><strong>Name:</strong> ${player.name}</p>
        <p><strong>Coins:</strong> ${player.coins}</p>
        <p><strong>Banned:</strong> ${player.banned ? "Yes" : "No"}</p>
      `;
      container.appendChild(div);
    });

  } catch (err) {
    console.error(err);
  }
}

loadPlayers();
</script>

</body>
</html>
