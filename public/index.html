<!DOCTYPE html>
<html>
<head>
  <title>Fortune Game</title>
</head>
<body>

<h1>Fortune Game</h1>

<input type="text" id="playerName" placeholder="Enter name">
<button onclick="joinGame()">Join Game</button>

<br><br>

<button onclick="spin()">Spin</button>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let playerName = "";

  socket.on("connect", () => {
    console.log("Connected:", socket.id);
  });

  function joinGame() {
    playerName = document.getElementById("playerName").value;
    socket.emit("joinGame", { name: playerName });
    console.log("Join sent");
  }

  function spin() {
    const result = Math.floor(Math.random() * 1000);
    socket.emit("spin", { name: playerName, result: result });
    console.log("Spin sent:", result);
  }
</script>

</body>
</html>
