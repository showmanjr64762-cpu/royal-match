<script src="/socket.io/socket.io.js"></script>

<script>
  // Create global socket
  const socket = io();

  socket.on("connect", () => {
    console.log("Connected:", socket.id);
  });

  function joinGame(name) {
    socket.emit("joinGame", { name: name });
    console.log("Join sent");
  }

  function sendSpin(result) {
    socket.emit("spin", { name: "Player", result: result });
    console.log("Spin sent");
  }
</script></body>
